spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Auto-update schema to add missing columns (like duration_seconds)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Social Login
google.client-id=620364552407-tvb4o5ecc14q5otrse5qneahbna0ntif.apps.googleusercontent.com
facebook.app-id=1216845940564522
facebook.app-secret=${FB_APP_SECRET}

# Secure CORS restrictions
cors.allowed-origins=https://runnearn.onrender.com,https://runnearn.vercel.app

# Secure JWT configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-minutes=60
