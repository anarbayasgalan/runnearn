<div class="login-container">
    <app-interactive-background></app-interactive-background>
    <div class="gradient-overlay"></div>

    <div class="card login-card">
        <div class="brand-header">
            <img src="assets/runnearn_logo.png" alt="Run'nEarn" class="brand-logo">
            <p class="subtitle">Create your account</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label>Email</label>
                <input type="text" formControlName="userName" class="input-field" placeholder="Enter your email">
                <div *ngIf="registerForm.get('userName')?.hasError('email') && registerForm.get('userName')?.touched"
                    class="field-error">
                    Please enter a valid email address!
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" formControlName="userPass" class="input-field" placeholder="Create a password">
            </div>

            <div class="form-group">
                <label>Repeat Password</label>
                <input type="password" formControlName="confirmPassword" class="input-field"
                    placeholder="Repeat password">
                <div *ngIf="registerForm.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched"
                    class="field-error">
                    Passwords don't match!
                </div>
            </div>

            <div class="form-group">
                <label>Company Name</label>
                <input type="text" formControlName="companyName" class="input-field"
                    placeholder="Enter your company name">
            </div>

            <div *ngIf="errorMsg" class="error-msg">
                {{ errorMsg }}
            </div>

            <button type="submit" class="btn btn-primary" [disabled]="registerForm.invalid || isLoading"
                style="width: 100%; margin-top: 1rem;">
                {{ isLoading ? 'Creating Account...' : 'Sign Up' }}
            </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
            <a routerLink="/login">Already have an account? Sign in</a>
        </div>
    </div>
</div>
