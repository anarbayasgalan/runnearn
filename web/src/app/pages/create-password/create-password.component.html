<div class="login-container" (mousemove)="onMouseMove($event)">
    <app-interactive-background></app-interactive-background>
    <div class="gradient-overlay" [style.background]="gradientStyle"></div>

    <div class="card login-card">
        <div class="brand-header">
            <img src="assets/runnearn_logo.png" alt="Run'nEarn" class="brand-logo">
            <p class="subtitle">Secure your account with a password.</p>
        </div>

        <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" formControlName="password" class="input-field" placeholder="Enter new password"
                    [ngClass]="{'is-invalid': passwordForm.get('password')?.invalid && passwordForm.get('password')?.touched}">
                <div *ngIf="passwordForm.get('password')?.errors?.['required'] && passwordForm.get('password')?.touched"
                    class="invalid-feedback">
                    Password is required
                </div>
                <div *ngIf="passwordForm.get('password')?.errors?.['minlength'] && passwordForm.get('password')?.touched"
                    class="invalid-feedback">
                    Minimum 6 characters
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" formControlName="confirmPassword" class="input-field"
                    placeholder="Confirm new password"
                    [ngClass]="{'is-invalid': (passwordForm.errors?.['mismatch'] || passwordForm.get('confirmPassword')?.invalid) && passwordForm.get('confirmPassword')?.touched}">
                <div *ngIf="passwordForm.errors?.['mismatch'] && passwordForm.get('confirmPassword')?.touched"
                    class="invalid-feedback">
                    Passwords do not match
                </div>
            </div>

            <div *ngIf="errorMsg()" class="error-msg">
                {{ errorMsg() }}
            </div>

            <button type="submit" class="btn btn-primary" [disabled]="passwordForm.invalid || loading()"
                style="width: 100%; margin-top: 1rem;">
                {{ loading() ? 'Saving...' : 'Save Password' }}
            </button>
        </form>
    </div>
</div>
